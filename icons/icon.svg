    <radialGradient id="flameCore" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFEC8B"/>
      <stop offset="100%" stop-color="#FFB627" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowGrad" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FF6B00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
