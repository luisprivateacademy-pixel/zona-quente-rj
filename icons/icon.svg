<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2d1810"/>
      <stop offset="60%" stop-color="#1a0d0a"/>
      <stop offset="100%" stop-color="#0d0605"/>
    </radialGradient>

    <linearGradient id="flameOuter" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FF8A50"/>
      <stop offset="40%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#B30D00"/>
