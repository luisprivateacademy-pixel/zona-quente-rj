<script type="module">
  // Importa Firebase do CDN oficial
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // Configuração do Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCcQnWQ9zd17SK9RDiXAQrOBgPVekznS5M",
    authDomain: "zona-quente-rj.firebaseapp.com",
    projectId: "zona-quente-rj",
    storageBucket: "zona-quente-rj.firebasestorage.app",
    messagingSenderId: "391720260616",
    appId: "1:391720260616:web:aac6f93d541621fe32edbd"
  };

  // Inicializa Firebase e expõe globalmente
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.zqFirebase = {
    db,
    collection,
    onSnapshot,
    doc,
    updateDoc,
    increment
  };

  // Avisa que tá pronto
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
/* =========================================================================
   ZONA QUENTE RJ — MVP v1
   --------------------------------------------------------------------------
   Esse arquivo é todo o app. Para colocar no ar:
   1. Suba esse arquivo no Vercel/Netlify/GitHub Pages
   2. Pronto, funciona em qualquer celular
   --------------------------------------------------------------------------
   COMO ATUALIZAR EVENTOS: edite o array EVENTOS abaixo e re-upload o arquivo.
   Quando tivermos backend, esse array vai vir de uma API.
   ========================================================================= */

/* ===== DADOS MOCKADOS (vai virar API depois) ===== */
/* ===== EVENTOS (vem do Firebase em tempo real) ===== */
let EVENTOS = [];

// Função que conecta ao Firebase e escuta mudanças em tempo real
function conectarFirebase() {
  if (!window.zqFirebase) {
    // Se o Firebase ainda não carregou, espera um pouco
    setTimeout(conectarFirebase, 100);
    return;
  }

  const { db, collection, onSnapshot } = window.zqFirebase;

  // Escuta a coleção 'eventos' em tempo real
  onSnapshot(collection(db, 'eventos'), (snapshot) => {
    EVENTOS = snapshot.docs.map(doc => ({
      id: doc.id,  // ID do Firestore vira o id do evento
      ...doc.data()
    }));

    // Re-renderiza o mapa com os novos dados
    const filtroAtivo = document.querySelector('.filter-btn.active');
    if (filtroAtivo) renderMarkers(filtroAtivo.dataset.filter);
    console.log('🔥 Eventos atualizados:', EVENTOS.length);
  }, (error) => {
    console.error('Erro Firebase:', error);
    mostrarErroFirebase();
  });
}

function mostrarErroFirebase() {
  document.getElementById('event-count').textContent = '!';
  const card = document.getElementById('sheet-empty');
  if (card) card.innerHTML = '⚠️ Erro ao conectar com servidor. Tente recarregar.';
}

/* ===== CONFIGURAÇÕES VISUAIS ===== */
const STATUS_CONFIG = {
  baixa:     { label: 'Demanda baixa',  color: '#ef4444', bg: '#3a1414', fg: '#ef4444', pulse: false },
  media:     { label: 'Demanda média',  color: '#facc15', bg: '#3a3014', fg: '#facc15', pulse: false },
  alta:      { label: 'Alta demanda',   color: '#22c55e', bg: '#143a1f', fg: '#22c55e', pulse: true  },
  estourado: { label: 'Estourado 🔥',   color: '#a855f7', bg: '#2e143a', fg: '#c084fc', pulse: true  }
};

/* ===== FEEDBACK STORAGE (em memória, depois vira backend) ===== */
// feedbacks agora ficam no Firebase, não em memória local

/* ===== INICIALIZAÇÃO DO MAPA ===== */
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([-22.9711, -43.1900], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

/* ===== MARCADORES ===== */
let markers = [];

function makeMarkerIcon(status) {
  const cfg = STATUS_CONFIG[status];
  const pulseHtml = cfg.pulse
    ? `<div class="marker-pulse" style="background:${cfg.color};opacity:0.4;"></div>`
    : '';
  return L.divIcon({
    className: 'zq-marker',
    html: `<div style="position:relative;">${pulseHtml}<div class="marker-dot" style="background:${cfg.color}"></div></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
  });
}

/* =====================================================
   FILTRO DE EVENTOS POR EXPIRAÇÃO
   - Recorrente: sempre aparece
   - Pontual: aparece até 1h depois do fim
   - Aviso visual (opacidade): nos últimos 30min antes do fim
   ===================================================== */
function eventoEstaAtivo(ev) {
  // Recorrentes sempre ativos
  if (ev.recorrencia === 'recorrente') return true;

  // Sem fim_timestamp = legado/recorrente
  if (!ev.fim_timestamp) return true;

  const agora = Date.now();
  const UMA_HORA = 60 * 60 * 1000;

  // Expirou se já passou mais de 1h depois do fim
  return (agora - ev.fim_timestamp) < UMA_HORA;
}

function eventoEstaTerminando(ev) {
  // Recorrentes nunca "terminam"
  if (ev.recorrencia === 'recorrente' || !ev.fim_timestamp) return false;

  const agora = Date.now();
  const TRINTA_MIN = 30 * 60 * 1000;
  const tempoAteFim = ev.fim_timestamp - agora;

  // Tá nos últimos 30min ou já passou do fim
  return tempoAteFim < TRINTA_MIN;
}

function renderMarkers(filtro) {
  // Limpa marcadores antigos
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // 1. Filtra eventos ativos (não expirados)
  const ativos = EVENTOS.filter(eventoEstaAtivo);

  // 2. Aplica o filtro do botão
  let filtrados;
  if (filtro === 'todos') {
    filtrados = ativos;
  } else if (filtro === 'perto') {
    // Filtra eventos a menos de RAIO_PERTO_KM da minha localização
    if (!minhaLocalizacao) {
      filtrados = [];
      showToast('📍 Aguarde sua localização carregar...');
    } else {
      filtrados = ativos.filter(ev => {
        const dist = calcularDistanciaKm(minhaLocalizacao.lat, minhaLocalizacao.lng, ev.lat, ev.lng);
        ev._distancia = dist; // salva pra mostrar no card
        return dist <= RAIO_PERTO_KM;
      });
      // Ordena por proximidade (mais perto primeiro)
      filtrados.sort((a, b) => a._distancia - b._distancia);
    }
  } else {
    filtrados = ativos.filter(e => e.filtros && e.filtros.includes(filtro));
  }

  // Calcula distância pra todos os eventos exibidos (mesmo fora do filtro "perto")
  if (minhaLocalizacao) {
    filtrados.forEach(ev => {
      if (ev._distancia === undefined) {
        ev._distancia = calcularDistanciaKm(minhaLocalizacao.lat, minhaLocalizacao.lng, ev.lat, ev.lng);
      }
    });
  }

  filtrados.forEach(ev => {
    const statusAgregado = calcularStatusAgregado(ev);
    ev._statusVisual = statusAgregado;

    const terminando = eventoEstaTerminando(ev);
    const m = L.marker([ev.lat, ev.lng], {
      icon: makeMarkerIcon(statusAgregado),
      opacity: terminando ? 0.55 : 1
    }).addTo(map);

    m.on('click', () => showEvento(ev));
    markers.push(m);
  });

  document.getElementById('event-count').textContent = filtrados.length;
}

/* ===== CARD DE EVENTO ===== */
function showEvento(ev) {
  // Usa o status agregado (com feedback) ao invés do original
  const statusVisual = ev._statusVisual || calcularStatusAgregado(ev);

  const totalFeedbacks = contarFeedbacksRecentes(ev);
  const sheet = document.getElementById('sheet');
  const empty = document.getElementById('sheet-empty');
  const content = document.getElementById('sheet-content');

  empty.style.display = 'none';
  content.style.display = 'block';
  sheet.classList.add('expanded');

    <div class="sheet-header">
      <div>
        <div class="sheet-title">${ev.nome}</div>
        <div class="sheet-loc">📍 ${ev.local}</div>
      </div>
      <div class="sheet-status" style="background:${cfg.bg};color:${cfg.fg};">${cfg.label}</div>
    </div>

    <div class="sheet-grid">
      <div class="sheet-card">
        <div class="sheet-card-label">Pico</div>
        <div class="sheet-card-value">${ev.inicio}–${ev.fim}</div>
      </div>
      <div class="sheet-card">
        <div class="sheet-card-label">Público</div>
        <div class="sheet-card-value" style="font-size:12px;">${ev.publico}</div>
      </div>
      <div class="sheet-card">

    </div>

    <div class="sheet-reason" style="border-left-color:${cfg.color};">
      <div class="sheet-reason-label">Por que está acontecendo</div>
      <div class="sheet-reason-text">${ev.motivo}</div>
    </div>

    ${ev._distancia !== undefined ? `
    <div style="background:#1a1a1a;padding:10px 12px;border-radius:8px;margin-top:10px;display:flex;align-items:center;gap:10px;">
      <div style="font-size:18px;">📍</div>
      <div>
        <div style="color:#666;font-size:9px;text-transform:uppercase;letter-spacing:0.6px;">Distância de você</div>
        <div style="color:#fff;font-size:14px;font-weight:600;margin-top:2px;">${ev._distancia < 1 ? Math.round(ev._distancia * 1000) + ' m' : ev._distancia.toFixed(1) + ' km'}</div>
      </div>
    </div>` : ''}

    ${(() => {
      // Card de info sobre feedback dos motoristas
      const fontInfo = totalFeedbacks === 0
        ? { titulo: 'Status definido por:', valor: '📋 Admin (sem votos ainda)', cor: '#888' }
        : totalFeedbacks === 1
          ? { titulo: 'Status definido por:', valor: '👥 1 voto + admin', cor: '#facc15' }
          : totalFeedbacks === 2
            ? { titulo: 'Status definido por:', valor: '👥 2 votos + admin', cor: '#facc15' }
            : { titulo: 'Status definido por:', valor: `🔥 ${totalFeedbacks} motoristas (consenso)`, cor: '#22c55e' };

      return `
    <div style="background:#1a1a1a;padding:10px 12px;border-radius:8px;margin-top:10px;">
      <div style="color:#666;font-size:9px;text-transform:uppercase;letter-spacing:0.6px;">${fontInfo.titulo}</div>
      <div style="color:${fontInfo.cor};font-size:12px;font-weight:600;margin-top:3px;">${fontInfo.valor}</div>
    </div>`;
    })()}

    <div class="sheet-actions">
      <button class="btn-primary" style="background:${cfg.color};" onclick="navegarPara('${ev.id}')">
        🧭 Ir para essa região
      </button>
      <button class="btn-secondary" onclick="compartilhar('${ev.id}')">📤</button>
    </div>

    <div class="feedback-section">
      <div class="feedback-title">Como tá lá?</div>
      <div class="feedback-buttons">
        <button class="feedback-btn" onclick="darFeedback('${ev.id}', 'fraco')">
          <span class="emoji">🥶</span>Tá fraco
        </button>
        <button class="feedback-btn" onclick="darFeedback('${ev.id}', 'medio')">
          <span class="emoji">😐</span>Médio
        </button>
        <button class="feedback-btn" onclick="darFeedback('${ev.id}', 'bom')">
          <span class="emoji">🙂</span>Bom
        </button>
        <button class="feedback-btn" onclick="darFeedback('${ev.id}', 'estourado')">
          <span class="emoji">🔥</span>Estourado
        </button>

}

/* ===== AÇÕES ===== */
function navegarPara(id) {
  const ev = EVENTOS.find(e => e.id === id);
  if (!ev) return;
  // Abre Waze / Google Maps com a coordenada
  const url = `https://www.google.com/maps/dir/?api=1&destination=${ev.lat},${ev.lng}&travelmode=driving`;
  window.open(url, '_blank');
}

function compartilhar(id) {
  const ev = EVENTOS.find(e => e.id === id);
  if (!ev) return;
  const texto = `🔥 ${ev.nome} em ${ev.local} — ${STATUS_CONFIG[ev.status].label}\nPico: ${ev.inicio}–${ev.fim}\n\nVia Zona Quente RJ`;
  if (navigator.share) {
    navigator.share({ title: 'Zona Quente RJ', text: texto });
  } else {
    navigator.clipboard.writeText(texto);
    showToast('Copiado para compartilhar!');
  }
}

/* =====================================================
   FEEDBACK COMPARTILHADO ENTRE MOTORISTAS
   ===================================================== */

const COOLDOWN_FEEDBACK_MS = 5 * 60 * 1000;  // 5 minutos entre votos no mesmo evento

async function darFeedback(id, tipo) {
  const labels = {
    fraco: 'Marcado como FRACO',
    medio: 'Marcado como MÉDIO',
    bom: 'Marcado como BOM',
    estourado: 'Marcado como ESTOURADO 🔥'
  };

  // ANTI-SPAM: bloqueia votos repetidos no mesmo evento (cooldown de 5min)
  const ultimoVoto = localStorage.getItem('zq_voto_' + id);
  if (ultimoVoto) {
    const tempoPassado = Date.now() - parseInt(ultimoVoto);
    if (tempoPassado < COOLDOWN_FEEDBACK_MS) {
      const minRestantes = Math.ceil((COOLDOWN_FEEDBACK_MS - tempoPassado) / 60000);
      showToast(`Você já votou. Tente de novo em ${minRestantes} min`);
      return;
    }
  }

  if (!window.zqFirebase) {
    showToast('Aguarde conectar...');
    return;
  }

  // Adiciona feedback no Firebase (lista de votos recentes + último timestamp)
  try {
    const { db, doc, updateDoc } = window.zqFirebase;
    const eventoRef = doc(db, 'eventos', String(id));

    // Pega lista atual de feedbacks recentes do evento
    const ev = EVENTOS.find(e => e.id === id);
    let feedbacksRecentes = (ev && ev.feedbacks_recentes) ? [...ev.feedbacks_recentes] : [];

    // Adiciona o novo voto
    feedbacksRecentes.push({ tipo, timestamp: Date.now() });

    // Limpa feedbacks com mais de 1h (não conta mais)
    const UMA_HORA = 60 * 60 * 1000;
    const agora = Date.now();
    feedbacksRecentes = feedbacksRecentes.filter(f => (agora - f.timestamp) < UMA_HORA);

    // Salva no Firebase — vai disparar onSnapshot e atualizar pra todos
    await updateDoc(eventoRef, {
      feedbacks_recentes: feedbacksRecentes,
      ultimo_feedback: Date.now()
    });

    // Marca cooldown LOCAL pra esse motorista
    localStorage.setItem('zq_voto_' + id, Date.now().toString());

    showToast(labels[tipo] + ' — valeu! 👊');
  } catch (err) {
    console.error('Erro ao salvar feedback:', err);
    showToast('Erro ao enviar. Tenta de novo.');
  }
}

/* =====================================================
   CALCULA STATUS DO EVENTO BASEADO NOS FEEDBACKS — MODELO HÍBRIDO

   Como funciona:
   - 0 votos: usa o status que o admin cadastrou
   - 1 voto: 50% admin + 50% motoristas
   - 2 votos: 25% admin + 75% motoristas
   - 3+ votos: 100% motoristas (consenso)

   Peso por tempo:
   - Últimos 30min: peso 100%
   - 30min a 1h: peso decrescente (linear)
   - Mais de 1h: ignorado
   ===================================================== */

// Converte string de status pra número (pra poder fazer média)
const STATUS_NUMERO = { baixa: 1, media: 2, alta: 3, estourado: 4 };

// Converte número de volta pra string (com arredondamento)
function numeroParaStatus(n) {
  if (n < 1.5) return 'baixa';
  else if (n < 2.5) return 'media';
  else if (n < 3.5) return 'alta';
  else return 'estourado';
}

function calcularStatusAgregado(evento) {
  const feedbacks = evento.feedbacks_recentes || [];
  const statusAdmin = STATUS_NUMERO[evento.status] || 2; // padrão "média"

  // Filtra só os feedbacks que ainda contam (até 1h)
  const agora = Date.now();
  const UMA_HORA = 60 * 60 * 1000;
  const TRINTA_MIN = 30 * 60 * 1000;
  const validos = feedbacks.filter(f => (agora - f.timestamp) < UMA_HORA);

  // Sem votos: usa o status do admin direto
  if (validos.length === 0) return evento.status;

  // Calcula média ponderada por tempo dos votos
  let somaPonderada = 0;
  let pesoTotal = 0;

  validos.forEach(fb => {
    const idade = agora - fb.timestamp;
    let pesoTempo;
    if (idade < TRINTA_MIN) {
      pesoTempo = 1.0;
    } else {
      pesoTempo = 1.0 - ((idade - TRINTA_MIN) / TRINTA_MIN);
    }
    somaPonderada += (STATUS_NUMERO[fb.tipo] || 2) * pesoTempo;
    pesoTotal += pesoTempo;
  });

  const mediaVotos = somaPonderada / pesoTotal;

  // MISTURA HÍBRIDA — quanto mais votos, mais peso pros motoristas
  let pesoVotos;
  if (validos.length === 1) pesoVotos = 0.5;       // 50%
  else if (validos.length === 2) pesoVotos = 0.75; // 75%
  else pesoVotos = 1.0;                            // 100% (3+ votos)

  const pesoAdmin = 1.0 - pesoVotos;
  const mediaFinal = (mediaVotos * pesoVotos) + (statusAdmin * pesoAdmin);

  return numeroParaStatus(mediaFinal);
}

/* Função pra contar feedbacks recentes (pra mostrar no card) */
function contarFeedbacksRecentes(evento) {
  const feedbacks = evento.feedbacks_recentes || [];
  const agora = Date.now();
  const UMA_HORA = 60 * 60 * 1000;
  return feedbacks.filter(f => (agora - f.timestamp) < UMA_HORA).length;
}

// (função antiga atualizarStatusPorFeedback removida — agora usa calcularStatusAgregado)

/* ===== TOAST ===== */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ===== FILTROS ===== */
document.querySelectorAll('.filter-btn').forEach(btn => {

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

/* ===== BOTTOM SHEET INTERAÇÃO ===== */
document.querySelector('.sheet-handle').addEventListener('click', () => {
  document.getElementById('sheet').classList.toggle('expanded');
});

/* ===== LISTA DE EVENTOS ===== */
function abrirListaEventos(somenteQuentes = false) {
  const lista = document.getElementById('events-list');
  const content = document.getElementById('events-list-content');
  const titulo = document.querySelector('.events-list-title');

  let evs = EVENTOS.slice();
  if (somenteQuentes) {
    evs = evs.filter(e => e.status === 'alta' || e.status === 'estourado');
    titulo.textContent = '🔥 Eventos quentes agora';
  } else {
    titulo.textContent = 'Eventos de hoje';
  }
  // Ordena: estourado > alta > media > baixa
  const ordem = { estourado: 0, alta: 1, media: 2, baixa: 3 };
  evs.sort((a, b) => ordem[a.status] - ordem[b.status]);

  content.innerHTML = evs.map(ev => {
    const cfg = STATUS_CONFIG[ev.status];
    return `
      <div class="event-card" onclick="abrirEventoDoMapa('${ev.id}')">
        <div class="event-card-header">
          <div>
            <div class="event-card-title">${ev.nome}</div>
            <div class="event-card-loc">📍 ${ev.local}</div>
          </div>
          <div class="sheet-status" style="background:${cfg.bg};color:${cfg.fg};">${cfg.label}</div>
        </div>
        <div class="event-card-meta">
          <span>⏰ ${ev.inicio}–${ev.fim}</span>
          <span>👥 ${ev.publico}</span>
          <span style="text-transform:capitalize;">🚗 ${ev.tipo_corrida}</span>
        </div>
      </div>
    `;
  }).join('');

  lista.classList.add('show');
}

function abrirEventoDoMapa(id) {
  document.getElementById('events-list').classList.remove('show');
  const ev = EVENTOS.find(e => e.id === id);
  if (ev) {
    map.setView([ev.lat, ev.lng], 16);
    setTimeout(() => showEvento(ev), 300);
  }
}

document.getElementById('events-back').addEventListener('click', () => {
  document.getElementById('events-list').classList.remove('show');
});

/* ===== NAVEGAÇÃO INFERIOR ===== */
document.getElementById('nav-events').addEventListener('click', () => abrirListaEventos(false));
document.getElementById('nav-hot').addEventListener('click', () => abrirListaEventos(true));
document.getElementById('nav-info').addEventListener('click', () => {
  alert('Zona Quente RJ — MVP v1\n\nMapa em tempo real para motoristas no Rio.\n\nVersão de teste — feedback bem-vindo!');
});

});

/* =====================================================
   LOCALIZAÇÃO DO MOTORISTA (privada — não vai pro Firebase)
   ===================================================== */
let minhaLocalizacao = null;       // { lat, lng, accuracy }
let userMarker = null;             // marcador no mapa
let watchId = null;                // ID do watchPosition

// Raio em km do filtro "perto"
const RAIO_PERTO_KM = 3;

// Calcula distância em km entre 2 pontos (fórmula de Haversine)
function calcularDistanciaKm(lat1, lng1, lat2, lng2) {
  const R = 6371; // raio da Terra em km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng/2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// Inicia o monitoramento de localização
function iniciarGeolocalizacao() {
  if (!navigator.geolocation) {
    console.warn('Geolocalização não suportada nesse navegador');
    return;
  }

  const btn = document.getElementById('btn-location');
  btn.classList.add('loading');

  // watchPosition fica monitorando em tempo real (eficiente em bateria)
  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      btn.classList.remove('loading');
      btn.classList.add('active');
      minhaLocalizacao = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy
      };
      atualizarMarcadorUsuario();

      // Se filtro "perto" estiver ativo, re-renderiza
      const filtroAtivo = document.querySelector('.filter-btn.active');
      if (filtroAtivo && filtroAtivo.dataset.filter === 'perto') {
        renderMarkers('perto');
      }
    },
    (err) => {
      btn.classList.remove('loading', 'active');
      console.warn('Erro de geolocalização:', err.message);
      if (err.code === 1) {
        showToast('Permissão de localização negada');
      } else if (err.code === 2) {
        showToast('Não foi possível obter localização');
      } else {
        showToast('Erro de localização');
      }
    },
    {
      enableHighAccuracy: false,    // economiza bateria
      timeout: 15000,
      maximumAge: 30000             // aceita posição de até 30s atrás
    }
  );
}

// Cria/atualiza o marcador azul "você está aqui"
function atualizarMarcadorUsuario() {
  if (!minhaLocalizacao || !map) return;

  if (userMarker) map.removeLayer(userMarker);

  const icon = L.divIcon({
    className: 'user-location-marker',
    html: '<div style="position:relative;"><div class="user-location-pulse"></div><div class="user-location-dot"></div></div>',
    iconSize: [16, 16],
    iconAnchor: [8, 8]
  });

  userMarker = L.marker([minhaLocalizacao.lat, minhaLocalizacao.lng], {
    icon,
    zIndexOffset: 1000  // sempre por cima dos pinos de eventos
  }).addTo(map);
}

// Botão "Onde estou" — centraliza no usuário
function centralizarMinhaLocalizacao() {
  const btn = document.getElementById('btn-location');

  if (!minhaLocalizacao) {
    // Primeira vez — pede permissão e inicia
    if (!watchId) {
      iniciarGeolocalizacao();
      showToast('📍 Buscando sua localização...');
    } else {
      showToast('📍 Aguarde a localização carregar...');
    }
    return;
  }

  // Centraliza o mapa na localização atual
  map.setView([minhaLocalizacao.lat, minhaLocalizacao.lng], 15);
}

/* ===== INICIALIZAÇÃO ===== */
// Espera o Firebase carregar antes de conectar
if (window.zqFirebase) {
  conectarFirebase();
} else {
  window.addEventListener('firebase-ready', conectarFirebase);
}

// Inicia geolocalização automaticamente (pede permissão na primeira visita)
// Pequeno delay pra deixar o mapa carregar primeiro
setTimeout(iniciarGeolocalizacao, 1500);

// A cada 60 segundos, re-renderiza pra atualizar quem expirou
setInterval(() => {
  const filtroAtivo = document.querySelector('.filter-btn.active');
  if (filtroAtivo && EVENTOS.length > 0) {
    renderMarkers(filtroAtivo.dataset.filter);
  }
}, 60000);

console.log('🔥 Zona Quente RJ carregando...');
</script>
